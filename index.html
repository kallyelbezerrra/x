<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini Twitter</title>

<style>

body{
    margin:0;
    background:#15202B;
    font-family:Arial;
    color:white;
}

.topo{
    background:#1DA1F2;
    padding:15px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    max-width:600px;
    margin:auto;
    padding:20px;
}

.card{
    background:#192734;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

textarea{
    resize:none;
    height:100px;
}

button{
    margin-top:10px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:8px;
    background:#1DA1F2;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.post{
    background:#192734;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

.usuario{
    color:#1DA1F2;
    font-weight:bold;
    margin-bottom:8px;
}

.data{
    color:#8899A6;
    font-size:12px;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="topo">
Mini Twitter
</div>

<div class="container">

<div class="card">

<input type="text" id="usuario" placeholder="Seu nome">

<textarea id="mensagem" placeholder="O que está acontecendo?"></textarea>

<button onclick="postar()">
Postar
</button>

</div>

<div id="feed"></div>

</div>

<script>

// COLE SUA URL DO APPS SCRIPT AQUI
const API_URL = "https://script.google.com/macros/s/AKfycbxT3G7rk7hfES77myLg_xAgEa_saU7TEZhkPIvGz_385IYE-Z1Vy2fKOLFIvJccyCXmYg/exec";

// CARREGAR POSTS
async function carregarPosts(){

    const resposta = await fetch(API_URL);

    const posts = await resposta.json();

    const feed = document.getElementById("feed");

    feed.innerHTML = "";

    posts.reverse();

    posts.forEach(post => {

        feed.innerHTML += `
        
        <div class="post">

            <div class="usuario">
                @${post.usuario}
            </div>

            <div>
                ${post.mensagem}
            </div>

            <div class="data">
                ${new Date(post.data).toLocaleString()}
            </div>

        </div>

        `;
    });

}

// ENVIAR POST
async function postar(){

    const usuario = document.getElementById("usuario").value.trim();

    const mensagem = document.getElementById("mensagem").value.trim();

    if(!usuario || !mensagem){
        alert("Preencha tudo");
        return;
    }

    await fetch(API_URL, {

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            usuario,
            mensagem
        })

    });

    document.getElementById("mensagem").value = "";

    carregarPosts();

}

// INICIAR
carregarPosts();

</script>

</body>
</html>
